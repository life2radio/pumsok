<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1B4332">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="품속">

  <!-- SEO -->
  <title>품속 — 이불 속에서 시작되는 기적</title>
  <meta name="description" content="매일 아침저녁 잠자리에서 시작하는 루틴. 다짐, 확언, 기록으로 인생2막을 시작하세요.">

  <!-- 카카오 공유 -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="품속 — 이불 속에서 시작되는 기적">
  <meta property="og:description" content="매일 아침저녁 잠자리에서 시작하는 루틴. 다짐, 확언, 기록으로 인생2막을 시작하세요.">
  <meta property="og:image" content="https://life2radio.github.io/pumsok/og-image.png">
  <meta property="og:url" content="https://life2radio.github.io/pumsok">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- 스타일 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── 앱 래퍼 ── -->
  <div id="app">

    <!-- 헤더 -->
    <header id="app-header">
      <div id="header-left"></div>
      <div id="header-title">품속</div>
      <div id="header-right"></div>
    </header>

    <!-- 메인 뷰 영역 -->
    <main id="app-main">

      <!-- 루틴 탭 -->
      <section id="view-routine" class="view-section active">
      </section>

      <!-- 다짐 탭 -->
      <section id="view-vow" class="view-section">
      </section>

      <!-- 확언 탭 -->
      <section id="view-affirmation" class="view-section">
      </section>

      <!-- 메모 탭 -->
      <section id="view-memo" class="view-section">
      </section>

      <!-- 테스트 탭 -->
      <section id="view-test" class="view-section">
      </section>

      <!-- 설정 탭 -->
      <section id="view-settings" class="view-section">
      </section>

    </main>

    <!-- 하단 네비게이션 -->
    <nav id="app-nav">
      <button class="nav-btn active" data-view="routine">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="nav-label">루틴</span>
      </button>
      <button class="nav-btn" data-view="vow">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
          <path d="M8 12l3 3 5-5"/>
        </svg>
        <span class="nav-label">다짐</span>
      </button>
      <button class="nav-btn" data-view="affirmation">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
        <span class="nav-label">확언</span>
      </button>
      <button class="nav-btn" data-view="memo">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        <span class="nav-label">메모</span>
      </button>
      <button class="nav-btn" data-view="test">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
        </svg>
        <span class="nav-label">테스트</span>
      </button>
      <button class="nav-btn" data-view="settings">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span class="nav-label">설정</span>
      </button>
    </nav>

  </div>

  <!-- 토스트 메시지 -->
  <div id="toast"></div>

  <!-- 스크립트 -->
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="extra.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }
  </script>

</body>
</html>
